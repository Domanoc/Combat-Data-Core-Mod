[WeaponDescription]
CDC_LaserPulseCannon="CANNONE A IMPULSI LASER A PORTATA ESTESA#Utilizza un'unità di alimentazione interna per fornire la maggior parte dell'energia. Le sue prestazioni possono essere incrementate fornendo energia aggiuntiva."
CDC_Howitzer="OBIETTIVO DA 240 MM"
[ResearchDescription]
CDC_LaserPulseCannonResearch="UNITÀ DI ALIMENTAZIONE AUSILIARIA#In grado di fornire energia portatile per armi ad alto consumo energetico senza sovraccaricare i collegamenti del reattore. Consente la produzione del cannone a impulsi laser a raggio esteso."
CDC_HighTechSolenoidResearch="ELETTROVALVOLA AD ALTA TECNOLOGIA#Grazie a processi metallurgici avanzati, possiamo creare un solenoide migliore per i nostri reattori termonucleari, garantendo loro caratteristiche di raffreddamento superiori."
CDC_BehemothResearch="NUOVO MECH: BEHEMOTH#14 cannoni, 5 di armatura, 95 di resistenza agli urti, 95 di resistenza all'acqua. Un massiccio mech d'assalto corazzato con tantissimi slot."
CDC_NovaResearch="NUOVO MECCANICO: NOVA#2 armi, 2 di armatura, 15 di resistenza agli urti, 40 di resistenza all'acqua. Un mech da combattimento prodotto in serie con statistiche discrete."
CDC_DeepDataCore="CENTRO DATI:#L'IA principale sta lavorando per sbloccare il livello successivo del nucleo dati di combattimento. Una volta completato, garantirà ulteriori opzioni di ricerca."
CDC_DataCore="CENTRO DATI:#L'IA principale sta lavorando allo sblocco del nucleo dati di combattimento. Una volta completato, garantirà ulteriori opzioni di ricerca."
CDC_FinalDataCore="CENTRO DATI:#L'IA principale sta lavorando allo sblocco dell'ultimo livello del nucleo dati di combattimento. Una volta completato, garantirà ulteriori opzioni di ricerca."
CDC_SentinelResearch="NUOVO MECH: SENTINEL#4 cannoni, 5 di armatura, 90 di resistenza agli urti, 80 di resistenza all'acqua. Mech d'assalto corazzato con numerosi slot ausiliari."
CDC_EchoResearch="NUOVO MECH: ECHO#3 armi, 3 di armatura, 30 di resistenza agli urti, 20 di resistenza all'acqua. Un mech corazzato ad alta mobilità."
CDC_HowitzerResearch="OBICE#Un grosso cannone da 240 mm riadattato per il tiro diretto."
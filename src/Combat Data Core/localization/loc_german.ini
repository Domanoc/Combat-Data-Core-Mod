[WeaponDescription]
CDC_LaserPulseCannon="Laserpulskanone mit erweiterter Reichweite#Nutzt eine interne Stromversorgungseinheit zur Bereitstellung des größten Teils der Energie. Die Leistung kann durch Zufuhr zusätzlicher Energie erhöht werden."
CDC_Howitzer="240-MM-HAUEIZARE"
[ResearchDescription]
CDC_LaserPulseCannonResearch="Hilfsstromversorgungseinheit#Kann tragbare Energie für Waffen mit hohem Energiebedarf bereitstellen, ohne die Reaktoranschlüsse zu überlasten. Ermöglicht die Produktion der Laserpulskanone mit erweiterter Reichweite."
CDC_HighTechSolenoidResearch="HOCHTECHNOLOGIE-MAGNETVENTIL#Mithilfe fortschrittlicher metallurgischer Verfahren können wir ein besseres Solenoid für unsere thermonuklearen Reaktoren herstellen. Dadurch erhalten diese bessere Kühleigenschaften."
CDC_BehemothResearch="NEUER MECH: BEHEMOTH#14 Geschütze, 5 Panzerung, 95 Stoßfestigkeit, 95 Wasserfestigkeit. Ein massiver, gepanzerter Angriffsmech mit zahlreichen Ausrüstungsslots."
CDC_NovaResearch="NEUER MECH: NOVA#2 Geschütze, 2 Panzerung, 15 Stoßfestigkeit, 40 Wasserfestigkeit. Ein in Serie gefertigter Kampfmech mit ordentlichen Werten."
CDC_DeepDataCore="DATENKERNE:#Die Haupt-KI arbeitet daran, die nächste Ebene des Kampfdatenkerns freizuschalten. Nach Fertigstellung werden zusätzliche Forschungsoptionen freigeschaltet."
CDC_DataCore="DATENKERNE:#Die Haupt-KI arbeitet daran, den Kampfdatenkern freizuschalten. Nach Abschluss der Arbeiten werden zusätzliche Forschungsoptionen freigeschaltet."
CDC_FinalDataCore="DATENKERNE:#Die Haupt-KI arbeitet daran, die letzte Ebene des Kampfdatenkerns freizuschalten. Nach Abschluss der Freischaltung werden zusätzliche Forschungsoptionen verfügbar."
CDC_SentinelResearch="NEUER MECH: SENTINEL#4 Geschütze, 5 Panzerung, 90 Stoßfestigkeit, 80 Wasserfestigkeit. Gepanzerter Angriffsmech mit zahlreichen Zusatzausrüstungsplätzen."
CDC_EchoResearch="NEUER MECH: ECHO#3 Geschütze, 3 Panzerung, 30 Stoßfestigkeit, 20 Wasserfestigkeit. Ein gepanzerter Mech mit hoher Mobilität."
CDC_HowitzerResearch="HAUBITZE#Eine große 240-mm-Artilleriekanone, die für den Einsatz im direkten Feuer umgerüstet wurde."
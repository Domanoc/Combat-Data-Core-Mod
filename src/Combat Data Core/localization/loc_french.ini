[ResearchDescription]
CDC_LaserPulseCannonResearch="GROUPE ÉLECTROGÈNE AUXILIAIRE#Capable de fournir une alimentation portable aux armes à forte consommation d'énergie sans surcharger les connexions du réacteur. Permet la production du CANON À IMPULSIONS LASER À PORTÉE ÉTENDUE."
CDC_HighTechSolenoidResearch="ÉLECTROVANNE HAUTE TECHNOLOGIE#Grâce à des procédés métallurgiques avancés, nous pouvons créer un solénoïde plus performant pour nos réacteurs thermonucléaires, leur conférant ainsi de meilleures caractéristiques de refroidissement."
CDC_BehemothResearch="NOUVEAU MÉCANIQUE : BÉHÉMOTH#14 canons, 5 points de blindage, 95 de résistance aux impacts, 95 de résistance à l'eau. Un mécha d'assaut blindé massif avec de nombreux emplacements d'équipement."
CDC_NovaResearch="NOUVEAU MECH : NOVA#2 canons, 2 points de blindage, 15 de résistance aux impacts, 40 de résistance à l'eau. Un mécha de combat produit en masse avec des statistiques correctes."
CDC_DeepDataCore="NOYAU DE DONNÉES :#L'IA principale travaille à débloquer la couche suivante du noyau de données de combat. Une fois cette étape terminée, elle débloquera des options de recherche supplémentaires."
CDC_DataCore="NOYAU DE DONNÉES :#L'IA principale travaille à déverrouiller le noyau de données de combat. Une fois cette opération terminée, elle débloquera des options de recherche supplémentaires."
CDC_FinalDataCore="NOYAU DE DONNÉES :#L'IA principale travaille à débloquer la dernière couche du noyau de données de combat. Une fois cette étape terminée, elle débloquera des options de recherche supplémentaires."
CDC_SentinelResearch="NOUVEAU MÉCANIQUE : SENTINELLE#4 canons, 5 points de blindage, 90 de résistance aux impacts, 80 de résistance à l'eau. Méca d'assaut blindé avec de nombreux emplacements auxiliaires."
CDC_EchoResearch="NOUVEAU MÉCANIQUE : ECHO#3 canons, 3 points de blindage, 30 de résistance aux impacts, 20 de résistance à l'eau. Un mécha blindé à haute mobilité."
CDC_HowitzerResearch="OBUSIER#Une pièce d'artillerie de gros calibre (240 mm) reconvertie pour le tir direct."
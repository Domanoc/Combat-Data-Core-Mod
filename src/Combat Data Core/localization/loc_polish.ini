[ResearchDescription]
CDC_LaserPulseCannonResearch="POMOCNICZY JEDNOSTKA ZASILANIA#Możliwość zapewnienia przenośnego zasilania broni o dużym poborze energii bez przeciążania połączeń reaktora. Umożliwia produkcję LASEROWEGO DZIAŁA IMPULSOWEGO O ROZSZERZONYM ZASIĘGU."
CDC_HighTechSolenoidResearch="ELEKTROMAGNETYCZNY HIGH TECH#Wykorzystując zaawansowane procesy metalurgiczne, możemy stworzyć lepszy elektromagnes do naszych reaktorów termojądrowych, zapewniając im lepsze właściwości chłodzące."
CDC_BehemothResearch="NOWY MECH: BEHEMOTH#14 dział, 5 punktów pancerza, 95 punktów odporności na uderzenia, 95 punktów odporności na wodę. Ogromny, opancerzony mech szturmowy z mnóstwem slotów."
CDC_NovaResearch="NOWY MECH: NOVA#2 działa, 2 pancerze, 15 punktów odporności na uderzenia, 40 punktów odporności na wodę. Masowo produkowany mech bojowy z przyzwoitymi statystykami."
CDC_DeepDataCore="Rdzeń danych:#Główna sztuczna inteligencja pracuje nad odblokowaniem kolejnej warstwy rdzenia danych bojowych. Po jej ukończeniu udostępni ona dodatkowe możliwości badawcze."
CDC_DataCore="Rdzeń danych:#Główna sztuczna inteligencja pracuje nad odblokowaniem rdzenia danych bojowych. Po jego ukończeniu udostępnione zostaną dodatkowe opcje badawcze."
CDC_FinalDataCore="Rdzeń danych:#Główna sztuczna inteligencja pracuje nad odblokowaniem ostatniej warstwy rdzenia danych bojowych. Po jej ukończeniu udostępni ona dodatkowe opcje badawcze."
CDC_SentinelResearch="NOWY MECH: SENTINEL#4 działa, 5 punktów pancerza, 90 punktów odporności na uderzenia, 80 punktów wodoodporności. Opancerzony mech szturmowy z wieloma dodatkowymi slotami."
CDC_EchoResearch="NOWY MECH: ECHO#3 działa, 3 pancerze, 30 odporności na uderzenia, 20 odporności na wodę. Opancerzony mech o dużej mobilności."
CDC_HowitzerResearch="HAUBICA#Duża broń artyleryjska kalibru 240 mm przystosowana do ognia bezpośredniego."